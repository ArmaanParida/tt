<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>School Timetable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      background: radial-gradient(circle at top, #f0f4ff, #dfe4ea);
    }

    .wrapper {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      padding: 1.5rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 1rem;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      table-layout: fixed;
      text-align: center;
      font-size: 0.85rem;
    }

    thead {
      background: #1e293b;
      color: white;
    }

    th, td {
      padding: 0.6rem 0.3rem;
      border: 1px solid #e2e8f0;
      height: 3.2rem;
    }

    td.day {
      background: #f1f5f9;
      font-weight: bold;
    }

    th.period {
      background: #0f172a;
    }

    .recess-sep {
      border-left: 3px solid #0ea5e9;
    }

    tbody tr:nth-child(even) {
      background: #f8fafc;
    }

    tbody tr:hover {
      background: #e0f2fe;
    }

    /* SUBJECT COLORS */
    .math { background: #dbeafe; }
    .phy { background: #fee2e2; }
    .chem { background: #dcfce7; }
    .bio { background: #fef9c3; }
    .eng { background: #f3e8ff; }
    .pe { background: #ffe4e6; }
    .comp { background: #e0f2fe; }
    .free { color: #999; font-style: italic; }

  </style>
</head>

<body>
  <div class="wrapper">
    <h1>School Timetable</h1>

    <table>
      <thead>
        <tr>
          <th class="period">Day / Period</th>
          <th>1</th>
          <th>2</th>
          <th>3</th>
          <th>4</th>
          <th class="recess-sep">5</th>
          <th>6</th>
          <th>7</th>
          <th>8</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td class="day">Mon</td>
          <td class="math">Math/Bio</td>
          <td class="chem">Chem</td>
          <td class="phy">Phy</td>
          <td class="free">XXX</td>
          <td class="eng recess-sep">Eng</td>
          <td class="pe">P.E.</td>
          <td class="math">Math</td>
          <td></td>
        </tr>

        <tr>
          <td class="day">Tue</td>
          <td>Test</td>
          <td class="phy">Phy</td>
          <td class="chem">Chem</td>
          <td class="free">XXX</td>
          <td class="pe recess-sep">P.E.</td>
          <td class="math">Math</td>
          <td class="eng">Eng</td>
          <td></td>
        </tr>

        <tr>
          <td class="day">Wed</td>
          <td class="phy">Phy</td>
          <td class="chem">Chem</td>
          <td class="chem">Chem</td>
          <td class="math">Math/Bio</td>
          <td class="free recess-sep">XXX</td>
          <td class="math">Math</td>
          <td class="eng">Eng</td>
          <td></td>
        </tr>

        <tr>
          <td class="day">Thu</td>
          <td class="phy">Phy</td>
          <td class="phy">Phy</td>
          <td class="math">Math/Bio</td>
          <td class="free">XXX</td>
          <td class="math recess-sep">Math</td>
          <td class="pe">P.E.</td>
          <td class="comp">Comp</td>
          <td></td>
        </tr>

        <tr>
          <td class="day">Fri</td>
          <td class="chem">Chem</td>
          <td class="math">Math/Bio</td>
          <td class="chem">Chem</td>
          <td class="chem">Chem</td>
          <td class="free recess-sep">XXX</td>
          <td class="comp">Comp</td>
          <td class="eng">Eng</td>
          <td></td>
        </tr>

        <tr>
          <td class="day">Sat</td>
          <td class="chem">Chem</td>
          <td class="math">Math/Bio</td>
          <td class="math">Math/Bio</td>
          <td class="free">XXX</td>
          <td class="eng recess-sep">Eng</td>
          <td class="comp">Comp</td>
          <td class="math">Math</td>
          <td></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
